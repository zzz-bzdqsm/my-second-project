spring.application.name=AppointmentRegistration

# 避免和你另一个项目 RobotScheduler 8080 冲突：这里用 8081
server.port=8081

# MySQL（请按你本机账号密码修改）
spring.datasource.url=jdbc:mysql://localhost:3306/appointment_registration?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis：下划线转驼峰（robot_id -> robotId）
mybatis.configuration.map-underscore-to-camel-case=true

# SQL 初始化：启动时执行 schema.sql / data.sql（开发演示用）
spring.sql.init.mode=always

# Redis（本机默认 6379）
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT 配置（面试时你可以说：secret 生产应放环境变量/配置中心）
app.jwt.secret=ChangeMeToALongerSecretKeyForDemo_AppointmentRegistration_2026
app.jwt.expire-seconds=7200

